apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fraud-platform-spark-jobs
  namespace: openshift-gitops
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: spark
  source:
    repoURL: https://github.com/bakralakhras/OpenShift-ArgoCD.git
    targetRevision: main
    path: fraud-platform/k8s/spark
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
