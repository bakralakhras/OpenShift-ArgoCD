apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: openshift-gitops
spec:
  project: default
  source:
    chart: minio
    repoURL: https://charts.min.io
    targetRevision: 5.0.15
    helm:
      valuesObject:
        rootUser: admin
        rootPassword: minio1234
        replicas: 1
        persistence:
          size: 10Gi
        mode: standalone
  destination:
    server: "https://kubernetes.default.svc"
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

