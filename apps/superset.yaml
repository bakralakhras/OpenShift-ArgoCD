apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: superset
  namespace: openshift-gitops
spec:
  project: default
  sources:
    - repoURL: https://apache.github.io/superset
      chart: superset
      targetRevision: 0.12.9
      helm:
        valueFiles:
          - $values/platform/superset/values.yaml
    - repoURL: https://github.com/bakralakhras/OpenShift-ArgoCD.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: superset
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
