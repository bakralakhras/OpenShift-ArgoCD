apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: superset
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/bakralakhras/OpenShift-ArgoCD.git
    targetRevision: HEAD
    path: platform/superset
  destination:
    server: https://kubernetes.default.svc
    namespace: superset
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
