apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-metrics-exporter
  namespace: kafka
  labels:
    app: fraud-metrics-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-metrics-exporter
  template:
    metadata:
      labels:
        app: fraud-metrics-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: exporter
          image: image-registry.openshift-image-registry.svc:5000/kafka/fraud-metrics-exporter:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-metrics-exporter
  namespace: kafka
  labels:
    app: fraud-metrics-exporter
spec:
  selector:
    app: fraud-metrics-exporter
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
