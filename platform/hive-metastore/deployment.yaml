apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      initContainers:
        - name: download-jars
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              curl -L https://jdbc.postgresql.org/download/postgresql-42.7.3.jar -o /aux-jars/postgresql-42.7.3.jar
          volumeMounts:
            - name: aux-jars
              mountPath: /aux-jars
      containers:
        - name: hive-metastore
          image: apache/hive:standalone-metastore-4.1.0
          ports:
            - containerPort: 9083
          env:
            - name: DB_DRIVER
              value: postgres
            - name: METASTORE_AUX_JARS_PATH
              value: /aux-jars
          volumeMounts:
            - name: config
              mountPath: /opt/hive/conf/metastore-site.xml
              subPath: metastore-site.xml
            - name: config
              mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              subPath: core-site.xml
            - name: aux-jars
              mountPath: /aux-jars
      volumes:
        - name: config
          configMap:
            name: hive-metastore-config
        - name: aux-jars
          emptyDir: {}
