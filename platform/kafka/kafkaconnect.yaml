apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: kafka-connect
  namespace: kafka
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 4.1.0
  replicas: 1
  bootstrapServers: lakehouse-kafka-kafka-bootstrap:9092
  build:
    output:
      type: docker
      image: default-route-openshift-image-registry.apps.ocp4.infrahub.com/kafka/kafka-connect-s3:latest
    plugins:
      - name: kafka-connect-s3
        artifacts:
          - type: tgz
            url: https://d1i4a15mxbxib1.cloudfront.net/api/plugins/confluentinc/kafka-connect-s3/versions/10.5.19/confluentinc-kafka-connect-s3-10.5.19.zip
  config:
    group.id: kafka-connect-group
    offset.storage.topic: kafka-connect-offsets
    config.storage.topic: kafka-connect-configs
    status.storage.topic: kafka-connect-status
