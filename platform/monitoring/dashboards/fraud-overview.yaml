apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: fraud-overview
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |
    {
      "title": "Fraud Detection Platform",
      "uid": "fraud-overview",
      "tags": ["fraud", "business"],
      "timezone": "browser",
      "schemaVersion": 38,
      "style": "dark",
      "refresh": "1m",
      "time": {"from": "now-6h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Total Transactions",
          "type": "stat",
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 0},
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "fixed", "fixedColor": "#5765f2"},
              "unit": "short",
              "decimals": 0,
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "#5765f2", "value": null}]}
            }
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
            "expr": "fraud_total_transactions_all",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "id": 2,
          "title": "Fraud Cases Detected",
          "type": "stat",
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 0},
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "fixed", "fixedColor": "#e02f44"},
              "unit": "short",
              "decimals": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "#e02f44", "value": null}]}
            }
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
            "expr": "fraud_total_fraud_count_all",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "id": 3,
          "title": "Avg Fraud Rate",
          "type": "stat",
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 0},
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "fixed", "fixedColor": "#ff9900"},
              "unit": "percentunit",
              "decimals": 2,
              "thresholds": {"mode": "absolute", "steps": [{"color": "#ff9900", "value": null}]}
            }
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
            "expr": "fraud_avg_fraud_rate_all",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "id": 4,
          "title": "Silver Layer Decisions",
          "type": "stat",
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 0},
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "fixed", "fixedColor": "#37872d"},
              "unit": "short",
              "decimals": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "#37872d", "value": null}]}
            }
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
            "expr": "fraud_silver_decisions_count",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "id": 5,
          "title": "Fraud Rate Gauge — Latest Day",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 5, "x": 0, "y": 5},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "showThresholdLabels": true,
            "showThresholdMarkers": true,
            "text": {"titleSize": 14, "valueSize": 36}
          },
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 0.15,
              "unit": "percentunit",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "#37872d", "value": null},
                  {"color": "#ff9900", "value": 0.03},
                  {"color": "#e02f44", "value": 0.07}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
            "expr": "fraud_daily_fraud_rate",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "id": 6,
          "title": "Fraud Rate by Product Code",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 10, "x": 5, "y": 5},
          "options": {
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "displayMode": "gradient",
            "valueMode": "color",
            "text": {"titleSize": 12, "valueSize": 16},
            "minVizWidth": 0,
            "minVizHeight": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 2,
              "min": 0,
              "max": 0.15,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "#37872d", "value": null},
                  {"color": "#ff9900", "value": 0.04},
                  {"color": "#e02f44", "value": 0.08}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
            "expr": "sort_desc(fraud_product_fraud_rate)",
            "instant": true,
            "legendFormat": "{{product}}"
          }]
        },
        {
          "id": 7,
          "title": "Hourly Fraud Rate — 24h Risk Pattern",
          "type": "barchart",
          "gridPos": {"h": 8, "w": 9, "x": 15, "y": 5},
          "options": {
            "orientation": "auto",
            "groupWidth": 0.7,
            "barWidth": 0.9,
            "fillOpacity": 85,
            "gradientMode": "none",
            "legend": {"displayMode": "hidden"},
            "tooltip": {"mode": "single"},
            "xTickLabelRotation": 0,
            "text": {"titleSize": 12}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 2,
              "custom": {"fillOpacity": 85, "lineWidth": 0},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "#37872d", "value": null},
                  {"color": "#ff9900", "value": 0.035},
                  {"color": "#e02f44", "value": 0.055}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
            "expr": "sort_desc(fraud_hourly_fraud_rate)",
            "instant": true,
            "legendFormat": "H{{hour}}"
          }]
        },
        {
          "id": 8,
          "title": "Transaction Volume by Product",
          "type": "piechart",
          "gridPos": {"h": 8, "w": 7, "x": 0, "y": 13},
          "options": {
            "pieType": "donut",
            "displayLabels": ["name", "percent"],
            "legend": {"displayMode": "table", "placement": "right", "values": ["value", "percent"]},
            "tooltip": {"mode": "single"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {"mode": "palette-classic"}
            }
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
            "expr": "fraud_product_transactions",
            "instant": true,
            "legendFormat": "{{product}}"
          }]
        },
        {
          "id": 9,
          "title": "Fraud vs Legitimate — Latest Day",
          "type": "piechart",
          "gridPos": {"h": 8, "w": 7, "x": 7, "y": 13},
          "options": {
            "pieType": "donut",
            "displayLabels": ["name", "percent"],
            "legend": {"displayMode": "table", "placement": "right", "values": ["value", "percent"]},
            "tooltip": {"mode": "single"}
          },
          "fieldConfig": {
            "defaults": {"unit": "short", "decimals": 0},
            "overrides": [
              {"matcher": {"id": "byName", "options": "Fraud"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#e02f44"}}]},
              {"matcher": {"id": "byName", "options": "Legitimate"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#37872d"}}]}
            ]
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
              "expr": "fraud_daily_fraud_count",
              "instant": true,
              "legendFormat": "Fraud"
            },
            {
              "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
              "expr": "fraud_daily_total_transactions - fraud_daily_fraud_count",
              "instant": true,
              "legendFormat": "Legitimate"
            }
          ]
        },
        {
          "id": 10,
          "title": "Platform Stats",
          "type": "stat",
          "gridPos": {"h": 8, "w": 10, "x": 14, "y": 13},
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "value_and_name",
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "horizontal"
          },
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "fixed", "fixedColor": "#5765f2"},
              "unit": "short",
              "decimals": 0
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "Days Tracked"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#9b59b6"}}]},
              {"matcher": {"id": "byName", "options": "Unique UIDs"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#1f60c4"}}]},
              {"matcher": {"id": "byName", "options": "Blocked Total"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "#e02f44"}}]}
            ]
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
              "expr": "fraud_days_tracked",
              "instant": true,
              "legendFormat": "Days Tracked"
            },
            {
              "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
              "expr": "sum(fraud_uid_risk_count)",
              "instant": true,
              "legendFormat": "Unique UIDs"
            },
            {
              "datasource": {"type": "prometheus", "uid": "9e5b7c92-d205-4816-8962-8d8856c180b8"},
              "expr": "fraud_total_blocked_all",
              "instant": true,
              "legendFormat": "Blocked Total"
            }
          ]
        }
      ]
    }
