apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fraud-platform-alerts
  namespace: kafka
  labels:
    role: alert-rules
spec:
  groups:
    - name: fraud.platform.critical
      interval: 60s
      rules:
        - alert: FraudRateSpikeDetected
          expr: fraud_daily_fraud_rate > 0.08
          for: 5m
          labels:
            severity: critical
            team: fraud-ops
          annotations:
            summary: "Fraud rate spike detected"
            description: "Daily fraud rate is {{ $value | humanizePercentage }} — exceeds 8% threshold. Immediate review required."

        - alert: FraudPipelineDLQNonZero
          expr: fraud_silver_decisions_count == 0
          for: 10m
          labels:
            severity: critical
            team: data-engineering
          annotations:
            summary: "Silver decisions table empty"
            description: "No fraud decisions recorded in silver layer for 10 minutes. Pipeline may be broken."

        - alert: KafkaBrokerDown
          expr: count(kube_pod_status_phase{namespace="kafka", phase="Running"} == 1) < 3
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Kafka broker pod count below minimum"
            description: "Only {{ $value }} Kafka broker pods running. Minimum is 3."

        - alert: SparkExecutorOOM
          expr: count(kube_pod_status_phase{namespace="spark", phase="Failed"} == 1) > 0
          for: 1m
          labels:
            severity: critical
            team: data-engineering
          annotations:
            summary: "Spark executor pod failed"
            description: "{{ $value }} Spark executor pod(s) in Failed state in spark namespace."

    - name: fraud.platform.warning
      interval: 60s
      rules:
        - alert: FraudRateElevated
          expr: fraud_daily_fraud_rate > 0.05
          for: 10m
          labels:
            severity: warning
            team: fraud-ops
          annotations:
            summary: "Fraud rate elevated"
            description: "Daily fraud rate is {{ $value | humanizePercentage }} — above 5% warning threshold."

        - alert: HighRiskProductCFraudRate
          expr: fraud_product_fraud_rate{product="C"} > 0.15
          for: 5m
          labels:
            severity: warning
            team: fraud-ops
          annotations:
            summary: "Product C fraud rate critical"
            description: "Product C fraud rate is {{ $value | humanizePercentage }} — exceeds 15% threshold."

        - alert: ArgoCDAppOutOfSync
          expr: count(argocd_app_info{sync_status="OutOfSync"}) > 3
          for: 15m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Multiple ArgoCD apps out of sync"
            description: "{{ $value }} ArgoCD applications are OutOfSync for more than 15 minutes."

        - alert: ClusterMemoryPressure
          expr: |
            1 - (sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) > 0.88
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Cluster memory pressure"
            description: "Cluster memory utilization at {{ $value | humanizePercentage }}. Risk of pod evictions."

        - alert: MinIOCapacityWarning
          expr: minio_cluster_capacity_usable_free_bytes / minio_cluster_capacity_usable_total_bytes < 0.20
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "MinIO usable capacity below 20%"
            description: "MinIO free usable capacity is {{ $value | humanizePercentage }}. Iceberg writes may fail."

        - alert: FraudExporterDown
          expr: up{job="fraud-metrics-exporter"} == 0
          for: 5m
          labels:
            severity: warning
            team: data-engineering
          annotations:
            summary: "Fraud metrics exporter down"
            description: "The fraud metrics exporter is not responding. Gold table metrics unavailable."

    - name: fraud.platform.info
      interval: 120s
      rules:
        - alert: AirflowDAGFailure
          expr: |
            count(kube_pod_status_phase{namespace="airflow", phase="Failed"} == 1) > 0
          for: 5m
          labels:
            severity: warning
            team: data-engineering
          annotations:
            summary: "Airflow pod failure detected"
            description: "{{ $value }} Airflow pod(s) in Failed state."

        - alert: HiveMetastoreDown
          expr: |
            count(kube_pod_status_phase{namespace="lakehouse", phase="Running"} == 1) == 0
          for: 2m
          labels:
            severity: critical
            team: data-engineering
          annotations:
            summary: "Hive Metastore is down"
            description: "No running pods in lakehouse namespace. Trino queries will fail."

        - alert: TrinoDown
          expr: |
            count(kube_pod_status_phase{namespace="trino", phase="Running"} == 1) == 0
          for: 2m
          labels:
            severity: critical
            team: data-engineering
          annotations:
            summary: "Trino is down"
            description: "No running pods in trino namespace. Gold layer queries and Superset unavailable."
