apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: trino
  namespace: monitoring
  labels:
    app: trino
spec:
  selector:
    matchLabels:
      app: trino
  namespaceSelector:
    matchNames:
      - trino
  endpoints:
    - port: http
      path: /v1/info
      interval: 30s
