apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      containers:
        - name: nifi
          image: apache/nifi:2.9.0
          env:
            - name: NIFI_WEB_HTTP_PORT
              value: "8080"
            - name: SINGLE_USER_CREDENTIALS_USERNAME
              value: "admin"
            - name: SINGLE_USER_CREDENTIALS_PASSWORD
              value: "admin1234567890"
          ports:
            - containerPort: 8443
            - containerPort: 8080
          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data
      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data
