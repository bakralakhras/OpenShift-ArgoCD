apiVersion: apps/v1
kind: Deployment
metadata:
  name: command-api
  namespace: platform-command-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: command-api
  template:
    metadata:
      labels:
        app: command-api
    spec:
      serviceAccountName: command-api
      containers:
        - name: command-api
          image: image-registry.openshift-image-registry.svc:5000/platform-command-ui/command-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: PROMETHEUS_URL
              value: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
            - name: PROMETHEUS_TOKEN_FILE
              value: /var/run/secrets/kubernetes.io/serviceaccount/token
            - name: PROMETHEUS_VERIFY_SSL
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: command-api
  namespace: platform-command-ui
spec:
  selector:
    app: command-api
  ports:
    - port: 8080
      targetPort: 8080
