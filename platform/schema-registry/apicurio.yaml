apiVersion: apps/v1
kind: Deployment
metadata:
  name: apicurio-registry
  namespace: schema-registry
  labels:
    app.kubernetes.io/name: apicurio-registry
    app.kubernetes.io/part-of: sovereign-data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apicurio-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apicurio-registry
        app.kubernetes.io/part-of: sovereign-data-platform
    spec:
      containers:
        - name: apicurio-registry
          image: quay.io/apicurio/apicurio-registry:3.0.8
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: QUARKUS_PROFILE
              value: prod
            - name: REGISTRY_DATASOURCE_URL
              value: jdbc:postgresql://schema-registry-postgres.schema-registry.svc.cluster.local:5432/schema_registry
            - name: REGISTRY_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: schema-registry-postgres
                  key: POSTGRESQL_USERNAME
            - name: REGISTRY_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: schema-registry-postgres
                  key: POSTGRESQL_PASSWORD
            - name: REGISTRY_STORAGE_KIND
              value: sql
            - name: REGISTRY_SQL_INIT
              value: "true"
            - name: REGISTRY_UI_FEATURES_READONLY
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: apicurio-registry
  namespace: schema-registry
  labels:
    app.kubernetes.io/name: apicurio-registry
    app.kubernetes.io/part-of: sovereign-data-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: apicurio-registry
  ports:
    - name: http
      port: 8080
      targetPort: http
