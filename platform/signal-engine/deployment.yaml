apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-engine
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: signal-engine
  template:
    metadata:
      labels:
        app: signal-engine
    spec:
      containers:
        - name: signal-engine
          image: image-registry.openshift-image-registry.svc:5000/kafka/signal-engine:v1
          imagePullPolicy: Always
          env:
            - name: KAFKA_BOOTSTRAP
              value: lakehouse-kafka-kafka-bootstrap:9092
