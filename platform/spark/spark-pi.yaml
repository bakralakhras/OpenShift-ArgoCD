apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-pi
  namespace: spark
spec:
  type: Scala
  mode: cluster
  sparkVersion: "4.0.0"
  image: "docker.io/library/spark:4.0.1"
  imagePullPolicy: IfNotPresent
  mainClass: org.apache.spark.examples.SparkPi
  mainApplicationFile: "local:///opt/spark/examples/jars/spark-examples.jar"
  restartPolicy:
    type: Never
  driver:
    serviceAccount: spark
    cores: 1
    memory: "512m"
    labels:
      app: spark-pi
    nodeSelector:
      kubernetes.io/hostname: worker2.ocp4.infrahub.com
    volumeMounts:
      - name: spark-workdir
        mountPath: /opt/spark/work-dir
  executor:
    instances: 1
    cores: 1
    memory: "256m"
    labels:
      app: spark-pi
    nodeSelector:
      kubernetes.io/hostname: worker2.ocp4.infrahub.com
    volumeMounts:
      - name: spark-workdir
        mountPath: /opt/spark/work-dir
  volumes:
    - name: spark-workdir
      emptyDir: {}
