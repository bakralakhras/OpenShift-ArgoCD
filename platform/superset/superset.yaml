apiVersion: v1
kind: ConfigMap
metadata:
  name: superset-config
  namespace: superset
data:
  superset_config.py: |
    import os
    SECRET_KEY = os.getenv("SUPERSET_SECRET_KEY")
    SQLALCHEMY_DATABASE_URI = os.getenv("SQLALCHEMY_DATABASE_URI")
    TALISMAN_ENABLED = False
    WTF_CSRF_ENABLED = True
    MAPBOX_API_KEY = ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: superset
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
    spec:
      serviceAccountName: default
      containers:
        - name: superset
          image: docker.io/apache/superset:4.1.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              pip install psycopg2-binary sqlalchemy-trino trino && \
              superset db upgrade && \
              (superset fab list-users | grep -q "admin" || superset fab create-admin \
                --username admin \
                --firstname Admin \
                --lastname User \
                --email admin@superset.local \
                --password admin1234567890) && \
              superset init && \
              /usr/bin/run-server.sh
          ports:
            - containerPort: 8088
              name: http
          envFrom:
            - secretRef:
                name: superset-env
          env:
            - name: SUPERSET_CONFIG_PATH
              value: /app/pythonpath/superset_config.py
            - name: TALISMAN_ENABLED
              value: "False"
          volumeMounts:
            - name: superset-config
              mountPath: /app/pythonpath/superset_config.py
              subPath: superset_config.py
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: superset-config
          configMap:
            name: superset-config

---
apiVersion: v1
kind: Service
metadata:
  name: superset
  namespace: superset
spec:
  selector:
    app: superset
  ports:
    - name: http
      port: 8088
      targetPort: http

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: superset
  namespace: superset
spec:
  to:
    kind: Service
    name: superset
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
