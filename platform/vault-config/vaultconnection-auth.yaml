---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  address: http://vault.vault.svc.cluster.local:8200
  skipTLSVerify: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultConnectionRef: vault-connection
  method: appRole
  mount: approle
  allowedNamespaces:
    - minio
    - postgresql
    - nifi
    - monitoring
  appRole:
    roleId: c28b2ede-acaf-fca3-47cb-9d259604ed6b
    secretRef: vault-approle
