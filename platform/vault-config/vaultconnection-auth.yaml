---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  address: http://vault.vault.svc.cluster.local:8200
  skipTLSVerify: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultConnectionRef: vault-connection
  method: appRole
  mount: approle
  appRole:
    roleId: 9f4564ec-cdb3-2972-350c-ef33d4cb17a1
    secretRef:
      name: vault-approle
      key: secret-id
