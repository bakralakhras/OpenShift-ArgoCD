---
# MinIO credentials
# Syncs Vault secret → Kubernetes secret "minio" in minio namespace
# Vault path: secret/data/platform/minio
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: minio-secret
  namespace: minio
spec:
  vaultAuthRef: vault/vault-auth
  mount: secret
  type: kv-v2
  path: platform/minio
  refreshAfter: 30s
  destination:
    name: minio
    create: true
    overwrite: true

